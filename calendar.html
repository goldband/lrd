<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #2d3142;
            --accent: #e63946;
            --accent-soft: #f4a6b4;
            --bg-light: #f8f9fa;
            --bg-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #0ea5e9;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #efefef 100%);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.95em;
            font-weight: 500;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin-bottom: 40px;
        }

        .calendar-wrapper {
            background: var(--bg-white);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            padding: 40px;
            animation: fadeInScale 0.7s ease-out;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .calendar-nav {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .month-year {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            font-weight: 700;
            color: var(--primary);
            min-width: 250px;
            text-align: center;
        }

        .today-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .today-btn:hover {
            background: #d62828;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .weekday {
            text-align: center;
            font-weight: 700;
            color: var(--text-light);
            padding: 12px 0;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            background: var(--bg-light);
            transition: all 0.3s ease;
            position: relative;
            font-weight: 600;
            font-size: 0.95em;
        }

        .day:hover {
            background: var(--accent-soft);
            transform: scale(1.08);
        }

        .day.empty {
            background: transparent;
            cursor: default;
        }

        .day.empty:hover {
            background: transparent;
            transform: scale(1);
        }

        .day.today {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.2);
        }

        .day.today:hover {
            transform: scale(1.1);
        }

        .day.has-event::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
        }

        .day.selected {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-card {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-lg);
            animation: fadeInScale 0.7s ease-out 0.1s both;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-card h2 {
            font-size: 1em;
        }

        .add-event-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9em;
        }

        .form-group input,
        .form-group textarea {
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .add-btn:hover {
            background: #d62828;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .events-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .event-item {
            background: var(--bg-light);
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease-out;
        }

        .event-item:hover {
            background: var(--accent-soft);
            transform: translateX(4px);
        }

        .event-info {
            flex: 1;
        }

        .event-time {
            font-size: 0.8em;
            color: var(--text-light);
            font-weight: 600;
        }

        .event-title {
            font-weight: 700;
            margin: 4px 0;
            color: var(--text-dark);
        }

        .event-desc {
            font-size: 0.8em;
            color: var(--text-light);
            margin-top: 2px;
        }

        .delete-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75em;
            font-weight: 600;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .delete-btn:hover {
            background: #d62828;
            transform: scale(1.05);
        }

        .empty-state {
            color: var(--text-light);
            text-align: center;
            padding: 20px 0;
            font-size: 0.9em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s ease-out;
        }

        .modal-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--border);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--accent);
            color: white;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-light);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #d62828;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2.2em;
            }

            .calendar-wrapper {
                padding: 24px;
            }
        }

        @media (max-width: 768px) {
            .calendar-header {
                flex-direction: column;
            }

            .month-year {
                min-width: auto;
            }

            .calendar-nav {
                width: 100%;
                justify-content: center;
            }

            .weekday {
                font-size: 0.75em;
            }

            .day {
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Calendar</h1>
            <p class="subtitle">Manage your schedule with style</p>
        </header>

        <div class="main-grid">
            <div class="calendar-wrapper">
                <div class="calendar-header">
                    <div class="calendar-nav">
                        <button class="nav-btn" id="prevBtn">← Previous</button>
                        <button class="nav-btn" id="nextBtn">Next →</button>
                    </div>
                    <div class="month-year" id="monthYear"></div>
                    <button class="today-btn" id="todayBtn">Today</button>
                </div>

                <div class="weekdays">
                    <div class="weekday">Sun</div>
                    <div class="weekday">Mon</div>
                    <div class="weekday">Tue</div>
                    <div class="weekday">Wed</div>
                    <div class="weekday">Thu</div>
                    <div class="weekday">Fri</div>
                    <div class="weekday">Sat</div>
                </div>

                <div class="days" id="calendar"></div>
            </div>

            <div class="sidebar">
                <div class="sidebar-card">
                    <div class="card-title">📅 Add Event</div>
                    <form class="add-event-form" id="eventForm">
                        <div class="form-group">
                            <label for="eventTitle">Event Title</label>
                            <input type="text" id="eventTitle" placeholder="Meeting, Birthday..." required>
                        </div>
                        <div class="form-group">
                            <label for="eventDate">Date</label>
                            <input type="date" id="eventDate" required>
                        </div>
                        <div class="form-group">
                            <label for="eventTime">Time</label>
                            <input type="time" id="eventTime">
                        </div>
                        <div class="form-group">
                            <label for="eventDesc">Description</label>
                            <textarea id="eventDesc" placeholder="Add details..."></textarea>
                        </div>
                        <button type="submit" class="add-btn">+ Add Event</button>
                    </form>
                </div>

                <div class="sidebar-card">
                    <div class="card-title">📌 Upcoming</div>
                    <div class="events-list" id="eventsList">
                        <div class="empty-state">No events scheduled</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class Calendar {
            constructor() {
                this.currentDate = new Date();
                this.selectedDate = null;
                this.events = this.loadEvents();
                this.init();
            }

            init() {
                this.render();
                this.attachListeners();
                this.updateEventsList();
                this.setEventDateToToday();
            }

            render() {
                this.renderCalendar();
                this.updateMonthYear();
            }

            renderCalendar() {
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                const calendar = document.getElementById('calendar');
                calendar.innerHTML = '';

                // Empty cells
                for (let i = 0; i < firstDay; i++) {
                    const empty = document.createElement('div');
                    empty.className = 'day empty';
                    calendar.appendChild(empty);
                }

                // Days
                const today = new Date();
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'day';
                    dayDiv.textContent = day;

                    const currentDay = new Date(year, month, day);
                    if (this.isSameDay(currentDay, today)) {
                        dayDiv.classList.add('today');
                    }

                    // Check for events
                    const dayEvents = this.events.filter(e => this.isSameDay(new Date(e.date), currentDay));
                    if (dayEvents.length > 0) {
                        dayDiv.classList.add('has-event');
                    }

                    dayDiv.addEventListener('click', () => this.selectDate(currentDay));
                    calendar.appendChild(dayDiv);
                }
            }

            updateMonthYear() {
                const options = { month: 'long', year: 'numeric' };
                document.getElementById('monthYear').textContent = 
                    this.currentDate.toLocaleDateString('en-US', options);
            }

            selectDate(date) {
                this.selectedDate = date;
                this.render();
            }

            isSameDay(date1, date2) {
                return date1.getFullYear() === date2.getFullYear() &&
                       date1.getMonth() === date2.getMonth() &&
                       date1.getDate() === date2.getDate();
            }

            attachListeners() {
                document.getElementById('prevBtn').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() - 1);
                    this.render();
                });

                document.getElementById('nextBtn').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() + 1);
                    this.render();
                });

                document.getElementById('todayBtn').addEventListener('click', () => {
                    this.currentDate = new Date();
                    this.render();
                });

                document.getElementById('eventForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addEvent();
                });
            }

            addEvent() {
                const title = document.getElementById('eventTitle').value;
                const date = document.getElementById('eventDate').value;
                const time = document.getElementById('eventTime').value;
                const desc = document.getElementById('eventDesc').value;

                if (!title || !date) return;

                const event = {
                    id: Date.now(),
                    title,
                    date,
                    time,
                    desc
                };

                this.events.push(event);
                this.saveEvents();
                document.getElementById('eventForm').reset();
                this.setEventDateToToday();
                this.render();
                this.updateEventsList();
            }

            deleteEvent(id) {
                this.events = this.events.filter(e => e.id !== id);
                this.saveEvents();
                this.render();
                this.updateEventsList();
            }

            updateEventsList() {
                const list = document.getElementById('eventsList');
                const upcoming = this.events
                    .filter(e => new Date(e.date) >= new Date().setHours(0, 0, 0, 0))
                    .sort((a, b) => new Date(a.date) - new Date(b.date))
                    .slice(0, 10);

                if (upcoming.length === 0) {
                    list.innerHTML = '<div class="empty-state">No events scheduled</div>';
                    return;
                }

                list.innerHTML = upcoming.map(event => {
                    const date = new Date(event.date);
                    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    return `
                        <div class="event-item">
                            <div class="event-info">
                                <div class="event-time">${dateStr}${event.time ? ' at ' + event.time : ''}</div>
                                <div class="event-title">${event.title}</div>
                                ${event.desc ? `<div class="event-desc">${event.desc}</div>` : ''}
                            </div>
                            <button class="delete-btn" onclick="calendar.deleteEvent(${event.id})">Delete</button>
                        </div>
                    `;
                }).join('');
            }

            setEventDateToToday() {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('eventDate').value = today;
            }

            saveEvents() {
                localStorage.setItem('calendarEvents', JSON.stringify(this.events));
            }

            loadEvents() {
                const stored = localStorage.getItem('calendarEvents');
                return stored ? JSON.parse(stored) : [];
            }
        }

        const calendar = new Calendar();
    </script>
</body>
</html>
